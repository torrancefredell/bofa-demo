<div class="balance-display card">
  <div class="balance-icon" [class.icon-chart]="icon === 'chart'">
    <svg *ngIf="icon === 'wallet'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
    <svg *ngIf="icon === 'chart'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
  </div>
  <div class="balance-body">
    <p class="balance-label">{{ label }}</p>
    <p class="balance-amount">
      <span *ngIf="isNegative">&minus;</span>${{ absBalance | number:'1.2-2' }}
    </p>
    <p *ngIf="sublabel" class="balance-sublabel">{{ sublabel }}</p>
  </div>
</div>
